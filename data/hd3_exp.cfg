# ====================================================================
# Antibody-antigen docking example with restraints from the antibody
# paratope to the NMR-identified epitope on the antigen 
# ====================================================================

# directory in which the scoring will be done
run_dir = "run_exp"

# compute mode
mode = "local"
ncores = 80

# Post-processing to generate statistics and plots
postprocess = true
clean = true

molecules =  [
    "antigen.pdb",
    "antibody_chainB.pdb"
    ]

# ====================================================================
# Parameters for each stage are defined below, prefer full paths
# ====================================================================
[topoaa]

[rigidbody]
# CDR + surface restraints
ambig_fname = "ti_exp.tbl"
# Restraints to keep the antibody chains together
unambig_fname = "unambig.tbl"

sampling = 10000

[caprieval]
reference_fname = "4G6M_ref.pdb"


[clustfcc]
plot_matrix = true
min_population = 1

[seletopclusts]
# Selection of the top 1 best scoring complexes from each cluster
top_models = 1 


[flexref]
tolerance = 5
# CDR + surface restraints
ambig_fname = "ti_exp.tbl"
# Restraints to keep the antibody chains together
unambig_fname = "unambig.tbl"


[caprieval]
reference_fname = "4G6M_ref.pdb"


[emref]
tolerance = 5
# CDR to NMR epitope ambig restraints
ambig_fname = "ti_exp.tbl"
# Restraints to keep the antibody chains together
unambig_fname = "unambig.tbl"

[caprieval]
reference_fname = "4G6M_ref.pdb"


[contactmap]

